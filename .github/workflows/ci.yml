name: Chameleon CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Run unit tests (skip crypto JVM tests)
        run: ./gradlew :security:testDebugUnitTest :core:testDebugUnitTest :data:testDebugUnitTest :domain:testDebugUnitTest :stealthx-ifr:testDebugUnitTest
        continue-on-error: false

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: chameleon-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/test-results/**/*.xml'

  security-scan:
    name: Security Pattern Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No crypto outside stealthx-crypto
        run: |
          VIOLATIONS=$(grep -r "lazysodium\|LazySodium" \
            --include="*.kt" . \
            | grep -v "stealthx-crypto/" \
            | grep -v "build.gradle" \
            | grep -v "SECURECALL_ANALYSIS" \
            | grep -v "^Binary" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "CRYPTO VIOLATION:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "No crypto violations"

      - name: No debug logs in crypto/security
        run: |
          VIOLATIONS=$(grep -rn "Log\.d\|Log\.v\|println" \
            --include="*.kt" \
            stealthx-crypto/src/main/ security/src/main/ || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "DEBUG LOG FOUND:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "No debug logs in sensitive modules"

      - name: No plaintext MediaStore in privatezone
        run: |
          VIOLATIONS=$(grep -rn "MediaStore\|/DCIM/" \
            --include="*.kt" \
            features/privatezone/src/main/ \
            | grep -v "^.*//.*" \
            | grep -v "^\s*\*" \
            | grep -v ":[0-9]*:\s*\*" \
            | grep -v "test/" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "MEDIASTORE VIOLATION:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "No MediaStore references in privatezone"
