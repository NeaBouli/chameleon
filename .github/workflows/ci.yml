name: Chameleon CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Lint ─────────────────────────────────────────────────────
  lint:
    name: Lint + Detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Run Android Lint
        run: ./gradlew lint

      - name: Run Detekt
        run: ./gradlew detekt

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: '**/build/reports/lint-results*.html'

  # ── Unit Tests ────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Run unit tests
        run: ./gradlew testAll

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/test-results/**/*.xml'

  # ── Build Debug ───────────────────────────────────────────────
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chameleon-debug
          path: app/build/outputs/apk/debug/*.apk

  # ── OWASP Dependency Check ────────────────────────────────────
  dependency-audit:
    name: OWASP Dependency Audit
    runs-on: ubuntu-latest
    # Weekly + on push to main
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: OWASP Dependency Check
        run: ./gradlew dependencyCheckAnalyze
        continue-on-error: true

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: build/reports/dependency-check-report.html

  # ── Security Scan (no plaintext crypto outside :stealthx-crypto) ─
  security-grep:
    name: Security Pattern Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check no crypto outside :stealthx-crypto
        run: |
          echo "Checking for lazysodium usage outside :stealthx-crypto..."
          VIOLATIONS=$(grep -r "lazysodium\|LazySodium\|XChaCha\|cryptoAead" \
            --include="*.kt" . \
            | grep -v "stealthx-crypto/" \
            | grep -v "^Binary" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ CRYPTO VIOLATION FOUND:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ No crypto violations found"

      - name: Check no debug logs in crypto/security
        run: |
          echo "Checking for debug logs in sensitive modules..."
          VIOLATIONS=$(grep -r "Log\.d\|Log\.v\|println" \
            --include="*.kt" \
            stealthx-crypto/ security/ || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ DEBUG LOG IN CRYPTO/SECURITY:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ No debug logs in sensitive modules"

      - name: Check no tier logic outside TierGate
        run: |
          echo "Checking for tier checks outside TierGate..."
          VIOLATIONS=$(grep -r "IfrTier\.\|isPro\|isElite" \
            --include="*.kt" . \
            | grep -v "TierGate\|IfrTierCache\|IfrTierActivator\|Models\|test" \
            | grep -v "^Binary" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "⚠️ POTENTIAL TIER CHECK OUTSIDE TIERGATE:"
            echo "$VIOLATIONS"
          fi
          echo "✅ Tier check scan complete"
