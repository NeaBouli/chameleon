name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build Release APK & Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew :security:testDebugUnitTest :core:testDebugUnitTest :data:testDebugUnitTest :domain:testDebugUnitTest :stealthx-ifr:testDebugUnitTest

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: chameleon-release-${{ github.ref_name }}
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          draft: true
          generate_release_notes: true
