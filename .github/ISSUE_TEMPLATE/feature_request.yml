name: Feature Request
description: Suggest a new feature for Chameleon
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What feature would you like to see?
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Why is this feature important? What problem does it solve?
    validations:
      required: true
  - type: dropdown
    id: tier
    attributes:
      label: Suggested Tier
      options:
        - FREE
        - PRO
        - ELITE
        - Not sure
    validations:
      required: false
